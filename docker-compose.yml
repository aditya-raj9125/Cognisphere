version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: backend-dev
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://3.90.229.104:3000}
    volumes:
      - ./backend/data:/app/data
    restart: always
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://3.90.229.104:8080}
    container_name: frontend-dev
    restart: always
    ports:
      - "3000:80"

  neo4j:
    image: neo4j:5.15
    container_name: neo4j-dev
    restart: always
    ports:
      - 7474:7474
      - 7687:7687
    environment:
      NEO4J_AUTH: neo4j/test123123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - ./neo4j/plugins:/plugins
    healthcheck:
      test: [ "CMD-SHELL", "echo 'healthcheck passed'" ]
      interval: 10s
      timeout: 10s
      retries: 5

